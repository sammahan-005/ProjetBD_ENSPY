name: zapps
description: Application de messagerie Zapps
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Réseau
  dio: ^5.7.0
  http: ^1.2.2
  flutter_client_sse: ^2.0.3

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Stockage (shared_prefs sur Linux, secure sur mobile)
  shared_preferences: ^2.3.3

  # Images & Médias
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  photo_view: ^0.15.0
  video_player: ^2.9.2

  # UI
  google_fonts: ^6.2.1
  timeago: ^3.7.0
  intl: ^0.19.0
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  lottie: ^3.1.3

  # Utilitaires
  equatable: ^2.0.7
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  path: ^1.9.1
  flutter_webrtc: ^1.4.1
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1
  freezed: ^2.5.7
  json_serializable: ^6.9.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
